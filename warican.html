<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJS共有わりかん精算アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Modules (CDN) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCMWZArRmeccx3liXYARpnUGH36VBwgr3s",
            authDomain: "warican-app.firebaseapp.com",
            projectId: "warican-app",
            storageBucket: "warican-app.firebasestorage.app",
            messagingSenderId: "211029573432",
            appId: "1:211029573432:web:6c646a5ca696686dc20bcd",
            measurementId: "G-J83RV5KVKG"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const generateShortId = () => Math.random().toString(36).substring(2, 8).toUpperCase();

        const Icon = ({ name, className }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthChecking, setIsAuthChecking] = useState(true);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            // イベント管理
            const [currentEventId, setCurrentEventId] = useState(null);
            const [eventName, setEventName] = useState('');
            const [joinInputId, setJoinInputId] = useState('');
            const [isEditingName, setIsEditingName] = useState(false);
            const [tempEventName, setTempEventName] = useState('');

            // データ用
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);

            // フォーム用
            const [newMemberName, setNewMemberName] = useState('');
            const [expDate, setExpDate] = useState(new Date().toISOString().split('T')[0]);
            const [expPayer, setExpPayer] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expDesc, setExpDesc] = useState('');

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            // 1. URLからID取得
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const idFromUrl = params.get('id');
                if (idFromUrl) {
                    setCurrentEventId(idFromUrl.toUpperCase());
                }
            }, []);

            // 2. 匿名認証
            useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, async (currentUser) => {
                    if (!currentUser) {
                        try {
                            await signInAnonymously(auth);
                        } catch (err) {
                            setError("認証エラー: " + err.message);
                        }
                    } else {
                        setUser(currentUser);
                    }
                    setIsAuthChecking(false);
                });
                return () => unsubscribeAuth();
            }, []);

            // 3. データ同期
            useEffect(() => {
                if (!user || !currentEventId) return;

                setLoading(true);
                const eventRef = doc(db, 'groups', currentEventId);
                
                const unsubEvent = onSnapshot(eventRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setEventName(data.name || '新しいイベント');
                        setMembers(data.members || []);
                        setLoading(false);
                        setError('');
                    } else {
                        setError("イベントが見つかりません。IDを確認してください。");
                        setLoading(false);
                        setCurrentEventId(null);
                    }
                }, (err) => {
                    setError("アクセス権限がないか、エラーが発生しました。");
                    setLoading(false);
                });

                const expensesRef = collection(db, 'groups', currentEventId, 'expenses');
                const unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setExpenses(data);
                });

                return () => { unsubEvent(); unsubExpenses(); };
            }, [user, currentEventId]);

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            });

            const handleCreateEvent = async () => {
                try {
                    setLoading(true);
                    const newId = generateShortId();
                    await setDoc(doc(db, 'groups', newId), {
                        name: '新しいイベント',
                        members: [],
                        createdAt: new Date().toISOString()
                    });
                    const newUrl = `${window.location.pathname}?id=${newId}`;
                    window.history.pushState({}, '', newUrl);
                    setCurrentEventId(newId);
                } catch (err) {
                    setError("作成に失敗しました: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleJoinEvent = (e) => {
                e.preventDefault();
                if (!joinInputId.trim()) return;
                const id = joinInputId.trim().toUpperCase();
                const newUrl = `${window.location.pathname}?id=${id}`;
                window.history.pushState({}, '', newUrl);
                setCurrentEventId(id);
            };

            const handleLeaveEvent = () => {
                setCurrentEventId(null);
                setMembers([]);
                setExpenses([]);
                window.history.pushState({}, '', window.location.pathname);
            };

            const copyShareUrl = () => {
                const url = window.location.href;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url);
                } else {
                    const dummy = document.createElement('input');
                    document.body.appendChild(dummy);
                    dummy.value = url;
                    dummy.select();
                    document.execCommand('copy');
                    document.body.removeChild(dummy);
                }
                showToast('共有用URLをコピーしました！');
            };

            const saveEventName = async () => {
                if (tempEventName.trim() && tempEventName !== eventName) {
                    await setDoc(doc(db, 'groups', currentEventId), { name: tempEventName.trim() }, { merge: true });
                }
                setIsEditingName(false);
            };

            const handleAddMember = async (e) => {
                e.preventDefault();
                if (!newMemberName.trim()) return;
                const updated = [...new Set([...members, newMemberName.trim()])];
                await setDoc(doc(db, 'groups', currentEventId), { members: updated }, { merge: true });
                setNewMemberName('');
            };

            const handleAddExpense = async (e) => {
                e.preventDefault();
                if (!expPayer || !expAmount) return;
                await addDoc(collection(db, 'groups', currentEventId, 'expenses'), {
                    date: expDate,
                    payer: expPayer,
                    amount: Number(expAmount),
                    description: expDesc || "無題の支出",
                    createdAt: new Date().toISOString()
                });
                setExpAmount('');
                setExpDesc('');
                showToast('追加しました！');
            };

            const handleDeleteExpense = async (id) => {
                await deleteDoc(doc(db, 'groups', currentEventId, 'expenses', id));
            };

            const settlementInfo = useMemo(() => {
                const total = expenses.reduce((s, e) => s + e.amount, 0);
                const perPerson = members.length > 0 ? total / members.length : 0;
                const balances = {};
                members.forEach(m => balances[m] = -perPerson);
                expenses.forEach(e => { if(balances[e.payer] !== undefined) balances[e.payer] += e.amount; });

                const debtors = Object.keys(balances).filter(k => balances[k] < -0.5).map(k => ({name: k, amt: -balances[k]}));
                const creditors = Object.keys(balances).filter(k => balances[k] > 0.5).map(k => ({name: k, amt: balances[k]}));
                const res = [];
                let i = 0, j = 0;
                while(i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: Math.round(pay) });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if(debtors[i].amt < 1) i++; if(creditors[j].amt < 1) j++;
                }
                return { total, perPerson, settlements: res };
            }, [members, expenses]);

            const formatCurrency = (amt) => new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(amt);

            if (isAuthChecking) return <div className="flex h-screen items-center justify-center text-gray-500 font-bold">起動中...</div>;

            // --- 画面1：トップ画面 ---
            if (!currentEventId) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50">
                        <div className="bg-white p-8 rounded-3xl shadow-xl border max-w-md w-full text-center">
                            <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
                                <Icon name="wallet" className="w-8 h-8 text-white"/>
                            </div>
                            <h1 className="text-2xl font-bold mb-2">共有わりかん精算</h1>
                            <p className="text-gray-500 text-sm mb-8">イベントごとの立替管理</p>

                            {error && <p className="text-red-500 text-sm mb-4 bg-red-50 p-3 rounded-lg border border-red-100">{error}</p>}

                            <button 
                                onClick={handleCreateEvent} 
                                disabled={loading}
                                className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-md mb-8 flex items-center justify-center gap-2 disabled:opacity-50"
                            >
                                <Icon name="sparkles" className="w-5 h-5"/>
                                {loading ? '作成中...' : '新しいイベントを作成'}
                            </button>

                            <div className="relative border-t border-gray-200 mb-8">
                                <span className="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-4 text-gray-400 text-sm italic">または</span>
                            </div>

                            <form onSubmit={handleJoinEvent} className="space-y-3">
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={joinInputId} 
                                        onChange={(e) => setJoinInputId(e.target.value)} 
                                        placeholder="イベントIDを入力" 
                                        className="flex-1 px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-mono uppercase"
                                    />
                                    <button type="submit" className="bg-gray-800 text-white px-6 rounded-xl font-bold hover:bg-gray-900 transition-colors">参加</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- 画面2：詳細画面 ---
            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pb-20">
                    {toastMsg && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2">
                            <Icon name="check" className="w-4 h-4 text-green-400"/>
                            {toastMsg}
                        </div>
                    )}

                    <header className="mb-6">
                        <button onClick={handleLeaveEvent} className="text-gray-500 hover:text-gray-800 flex items-center gap-1 text-sm mb-4 transition-colors">
                            <Icon name="chevron-left" className="w-4 h-4"/> 戻る
                        </button>
                        
                        <div className="bg-white p-5 rounded-3xl shadow-sm border flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-50 p-3 rounded-2xl text-blue-600"><Icon name="map-pin" className="w-6 h-6"/></div>
                                <div>
                                    {isEditingName ? (
                                        <input 
                                            autoFocus
                                            value={tempEventName} 
                                            onChange={e => setTempEventName(e.target.value)}
                                            onBlur={saveEventName}
                                            onKeyDown={e => e.key === 'Enter' && saveEventName()}
                                            className="text-xl font-bold border-b-2 border-blue-500 outline-none w-full"
                                        />
                                    ) : (
                                        <h1 className="text-xl font-bold flex items-center gap-2 cursor-pointer" onClick={() => { setTempEventName(eventName); setIsEditingName(true); }}>
                                            {eventName} <Icon name="edit-2" className="w-3 h-3 text-gray-400"/>
                                        </h1>
                                    )}
                                    <p className="text-xs text-gray-400 font-mono mt-0.5">ID: {currentEventId}</p>
                                </div>
                            </div>
                            <button onClick={copyShareUrl} className="bg-blue-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-blue-700 transition-shadow">
                                <Icon name="link" className="w-4 h-4"/> 共有URLをコピー
                            </button>
                        </div>
                    </header>

                    <div className="grid md:grid-cols-3 gap-6">
                        <div className="space-y-6">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border">
                                <h2 className="font-bold flex items-center gap-2 mb-4 text-gray-600"><Icon name="users" className="w-4 h-4"/> メンバー</h2>
                                <form onSubmit={handleAddMember} className="flex gap-2 mb-4">
                                    <input type="text" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="名前" className="flex-1 px-3 py-2 bg-gray-50 border rounded-lg text-sm outline-none"/>
                                    <button type="submit" className="bg-gray-200 p-2 rounded-lg hover:bg-gray-300 transition-colors"><Icon name="plus" className="w-5 h-5"/></button>
                                </form>
                                <div className="flex flex-wrap gap-2">
                                    {members.map(m => (
                                        <span key={m} className="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-bold border">{m}</span>
                                    ))}
                                    {members.length === 0 && <p className="text-xs text-gray-400 italic">メンバーなし</p>}
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border">
                                <h2 className="font-bold flex items-center gap-2 mb-4 text-gray-600"><Icon name="plus-circle" className="w-4 h-4"/> 支出を追加</h2>
                                <form onSubmit={handleAddExpense} className="space-y-3">
                                    <input type="date" value={expDate} onChange={e => setExpDate(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-sm"/>
                                    <select value={expPayer} onChange={e => setExpPayer(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-sm outline-none">
                                        <option value="">支払った人を選択</option>
                                        {members.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <input type="number" placeholder="金額" value={expAmount} onChange={e => setExpAmount(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-sm outline-none"/>
                                    <input type="text" placeholder="内容 (ランチなど)" value={expDesc} onChange={e => setExpDesc(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-sm outline-none"/>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700">追加</button>
                                </form>
                            </div>
                        </div>

                        <div className="md:col-span-2 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
                                <h2 className="font-bold mb-4 text-blue-600 flex items-center gap-2"><Icon name="check-square" className="w-5 h-5"/> 精算結果</h2>
                                <div className="flex justify-between items-center mb-6 bg-blue-50 p-4 rounded-2xl">
                                    <div>
                                        <p className="text-xs text-blue-400 font-bold uppercase">合計金額</p>
                                        <p className="text-2xl font-black text-blue-700">{formatCurrency(settlementInfo.total)}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-xs text-blue-400 font-bold uppercase">1人あたり</p>
                                        <p className="text-xl font-bold text-blue-700">{formatCurrency(settlementInfo.perPerson)}</p>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {settlementInfo.settlements.map((s, i) => (
                                        <div key={i} className="flex items-center justify-between bg-white border p-4 rounded-xl shadow-sm">
                                            <div className="flex items-center gap-2">
                                                <span className="font-bold text-gray-800">{s.from}</span>
                                                <Icon name="arrow-right" className="w-4 h-4 text-blue-300"/>
                                                <span className="font-bold text-blue-600">{s.to}</span>
                                            </div>
                                            <span className="font-black text-lg">{formatCurrency(s.amount)}</span>
                                        </div>
                                    ))}
                                    {settlementInfo.settlements.length === 0 && members.length > 0 && (
                                        <p className="text-center py-4 text-gray-400 text-sm italic">精算は不要です</p>
                                    )}
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border">
                                <h2 className="font-bold mb-4 text-gray-600">支出履歴</h2>
                                <div className="space-y-2 max-h-96 overflow-y-auto custom-scrollbar">
                                    {expenses.map(e => (
                                        <div key={e.id} className="flex justify-between items-center p-3 border-b hover:bg-gray-50 rounded-lg group">
                                            <div>
                                                <p className="font-bold text-sm text-gray-800">{e.description}</p>
                                                <p className="text-[10px] text-gray-400 uppercase">{e.date} • {e.payer}</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-sm">{formatCurrency(e.amount)}</span>
                                                <button onClick={() => handleDeleteExpense(e.id)} className="text-gray-300 hover:text-red-500 transition-colors"><Icon name="trash-2" className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {expenses.length === 0 && <p className="text-center py-8 text-gray-300 text-xs italic">履歴がありません</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
